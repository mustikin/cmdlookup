<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CMD Lookup - Windows Command Cheat Sheet</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu', 'Cantarell', sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #0f172a 100%);
            min-height: 100vh;
            color: #e2e8f0;
            padding: 1.5rem;
        }

        .container {
            max-width: 64rem;
            margin: 0 auto;
        }

        header {
            margin-bottom: 2rem;
        }

        h1 {
            font-size: 2.25rem;
            font-weight: 700;
            color: #ffffff;
            margin-bottom: 0.5rem;
        }

        .subtitle {
            color: #cbd5e1;
            font-size: 1rem;
        }

        .controls {
            margin-bottom: 2rem;
        }

        .search-wrapper {
            position: relative;
            margin-bottom: 1rem;
        }

        .search-icon {
            position: absolute;
            left: 0.75rem;
            top: 0.75rem;
            color: #64748b;
            pointer-events: none;
        }

        #searchInput {
            width: 100%;
            padding: 0.75rem 1rem 0.75rem 2.5rem;
            background: #475569;
            border: 1px solid #334155;
            border-radius: 0.5rem;
            color: #ffffff;
            font-size: 1rem;
            transition: border-color 0.3s;
        }

        #searchInput::placeholder {
            color: #94a3b8;
        }

        #searchInput:focus {
            outline: none;
            border-color: #3b82f6;
        }

        .filter-buttons {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
        }

        .filter-btn {
            padding: 0.5rem 1rem;
            background: #475569;
            border: 1px solid #334155;
            border-radius: 0.5rem;
            color: #cbd5e1;
            cursor: pointer;
            font-weight: 500;
            transition: all 0.3s;
        }

        .filter-btn:hover {
            background: #64748b;
        }

        .filter-btn.active {
            background: #2563eb;
            color: #ffffff;
            border-color: #2563eb;
        }

        .add-command-section {
            margin-bottom: 2rem;
        }

        .add-btn {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.5rem 1rem;
            background: #16a34a;
            border: none;
            border-radius: 0.5rem;
            color: #ffffff;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.3s;
        }

        .add-btn:hover {
            background: #15803d;
        }

        .custom-form {
            background: #475569;
            border: 1px solid #334155;
            border-radius: 0.5rem;
            padding: 1rem;
            display: none;
        }

        .custom-form.open {
            display: block;
        }

        .form-group {
            margin-bottom: 0.75rem;
        }

        .form-group input,
        .form-group select {
            width: 100%;
            padding: 0.5rem 0.75rem;
            background: #334155;
            border: 1px solid #1e293b;
            border-radius: 0.375rem;
            color: #ffffff;
            font-size: 0.875rem;
        }

        .form-group input::placeholder {
            color: #64748b;
        }

        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: #2563eb;
        }

        .form-buttons {
            display: flex;
            gap: 0.5rem;
        }

        .form-buttons button {
            flex: 1;
            padding: 0.5rem 0.75rem;
            border: none;
            border-radius: 0.375rem;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.3s;
        }

        .form-buttons .save-btn {
            background: #16a34a;
            color: #ffffff;
        }

        .form-buttons .save-btn:hover {
            background: #15803d;
        }

        .form-buttons .cancel-btn {
            background: #475569;
            color: #ffffff;
        }

        .form-buttons .cancel-btn:hover {
            background: #64748b;
        }

        .commands-grid {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }

        .command-card {
            background: #475569;
            border: 1px solid #334155;
            border-radius: 0.5rem;
            padding: 1rem;
            transition: border-color 0.3s;
        }

        .command-card:hover {
            border-color: #64748b;
        }

        .command-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 1rem;
            margin-bottom: 0.75rem;
        }

        .command-info h3 {
            color: #ffffff;
            font-weight: 600;
            margin-bottom: 0.25rem;
        }

        .command-info p {
            color: #94a3b8;
            font-size: 0.875rem;
        }

        .command-category {
            padding: 0.25rem 0.5rem;
            background: #334155;
            border-radius: 0.25rem;
            color: #cbd5e1;
            font-size: 0.75rem;
            font-weight: 500;
            white-space: nowrap;
        }

        .command-code {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            background: #1e293b;
            border-radius: 0.375rem;
            padding: 0.75rem;
        }

        .command-code code {
            flex: 1;
            font-family: 'Monaco', 'Menlo', 'Ubuntu Mono', 'Courier New', monospace;
            font-size: 0.875rem;
            color: #e2e8f0;
            word-break: break-all;
        }

        .copy-btn {
            flex-shrink: 0;
            padding: 0.5rem;
            background: transparent;
            border: none;
            color: #64748b;
            cursor: pointer;
            transition: color 0.3s;
            width: 1.5rem;
            height: 1.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .copy-btn:hover {
            color: #cbd5e1;
        }

        .copy-btn.copied {
            color: #4ade80;
        }

        .delete-btn {
            flex-shrink: 0;
            padding: 0.5rem;
            background: transparent;
            border: none;
            color: #ef4444;
            cursor: pointer;
            transition: color 0.3s;
            width: 1.5rem;
            height: 1.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .delete-btn:hover {
            color: #f87171;
        }

        .empty-state {
            text-align: center;
            padding: 3rem 1rem;
            color: #64748b;
        }

        .empty-state p:first-child {
            font-size: 1.125rem;
            margin-bottom: 0.5rem;
        }

        footer {
            margin-top: 3rem;
            text-align: center;
            color: #64748b;
            font-size: 0.875rem;
        }

        @media (max-width: 640px) {
            h1 {
                font-size: 1.875rem;
            }

            .command-header {
                flex-direction: column;
            }

            .filter-buttons {
                gap: 0.25rem;
            }

            .filter-btn {
                padding: 0.375rem 0.75rem;
                font-size: 0.875rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>CMD Lookup</h1>
            <p class="subtitle">Searchable cheat sheet for everyday Windows commands</p>
        </header>

        <div class="controls">
            <div class="search-wrapper">
                <svg class="search-icon" width="20" height="20" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="8" cy="8" r="6"></circle>
                    <path d="m12 12 4 4"></path>
                </svg>
                <input type="text" id="searchInput" placeholder="Search commands, names, or descriptions...">
            </div>

            <div class="filter-buttons" id="filterButtons"></div>
        </div>

        <div class="add-command-section">
            <button class="add-btn" id="addCommandBtn">
                <span>➕</span> Add Custom Command
            </button>

            <div class="custom-form" id="customForm">
                <div class="form-group">
                    <input type="text" id="customName" placeholder="Command name (e.g., 'Check Disk Space')">
                </div>
                <div class="form-group">
                    <input type="text" id="customCommand" placeholder="Actual command (e.g., 'wmic logicaldisk get name,size,freespace')">
                </div>
                <div class="form-group">
                    <select id="customCategory">
                        <option value="Network">Network</option>
                        <option value="AD">AD</option>
                        <option value="Disk">Disk</option>
                        <option value="User">User</option>
                        <option value="System">System</option>
                    </select>
                </div>
                <div class="form-buttons">
                    <button class="save-btn" id="saveCustomBtn">Save</button>
                    <button class="cancel-btn" id="cancelCustomBtn">Cancel</button>
                </div>
            </div>
        </div>

        <div class="commands-grid" id="commandsGrid"></div>

        <footer>
            <p id="commandCount">Showing 30 commands</p>
             <p style="margin-top: 1.5rem; font-size: 0.875rem;">Built by A. B. Mustikin. Powered with ⚡Byteware Reboot. </p>
        </footer>
    </div>

    <script>
        const defaultCommands = [
            // Network - Basic
            { id: 1, category: 'Network', name: 'Check IP Configuration', command: 'ipconfig /all', description: 'Display detailed IP config for all adapters' },
            { id: 2, category: 'Network', name: 'Flush DNS Cache', command: 'ipconfig /flushdns', description: 'Clear the DNS resolver cache' },
            { id: 3, category: 'Network', name: 'Renew IP Address', command: 'ipconfig /release && ipconfig /renew', description: 'Release and renew DHCP lease' },
            { id: 4, category: 'Network', name: 'Test Network Connectivity', command: 'ping google.com', description: 'Ping a remote host to test connectivity' },
            { id: 5, category: 'Network', name: 'Check Open Ports', command: 'netstat -ano | findstr LISTENING', description: 'List all listening ports with process IDs' },
            { id: 6, category: 'Network', name: 'Traceroute', command: 'tracert google.com', description: 'Trace route packets take to destination' },
            { id: 31, category: 'Network', name: 'Check Network Adapter Status', command: 'wmic nic get name,status', description: 'List all network adapters and their status' },
            { id: 32, category: 'Network', name: 'Test Port Connection', command: 'netstat -an | findstr :PORT', description: 'Check if specific port is listening (replace PORT)' },
            { id: 33, category: 'Network', name: 'Display All Network Connections', command: 'netstat -abc', description: 'Show connections with associated process names' },
            { id: 34, category: 'Network', name: 'Get Gateway Address', command: 'ipconfig | findstr "Gateway"', description: 'Find default gateway IP address' },
            { id: 35, category: 'Network', name: 'Disable Network Adapter', command: 'netsh interface set interface name="Adapter Name" admin=disabled', description: 'Disable network adapter by name' },
            { id: 36, category: 'Network', name: 'Enable Network Adapter', command: 'netsh interface set interface name="Adapter Name" admin=enabled', description: 'Enable network adapter by name' },
            { id: 37, category: 'Network', name: 'View Routing Table', command: 'route print', description: 'Display all network routes' },
            { id: 38, category: 'Network', name: 'Resolve Hostname to IP', command: 'nslookup google.com', description: 'DNS lookup to get IP address from hostname' },
            { id: 39, category: 'Network', name: 'Show MAC Address', command: 'ipconfig /all | findstr "Physical Address"', description: 'Display MAC addresses of all adapters' },

            // Active Directory
            { id: 7, category: 'AD', name: 'Check AD User', command: 'net user USERNAME /domain', description: 'Query Active Directory user information' },
            { id: 8, category: 'AD', name: 'Reset User Password', command: 'net user USERNAME newpassword /domain', description: 'Reset AD user password (requires domain admin)' },
            { id: 9, category: 'AD', name: 'List Domain Users', command: 'net user /domain', description: 'Display all users in the domain' },
            { id: 10, category: 'AD', name: 'Check Group Membership', command: 'net user USERNAME /domain | findstr Groups', description: 'Show AD groups for a user' },
            { id: 12, category: 'AD', name: 'Query Computer AD Info', command: 'dsquery computer -name COMPUTERNAME', description: 'Find computer object in Active Directory' },
            { id: 40, category: 'AD', name: 'List Domain Groups', command: 'net group /domain', description: 'Display all groups in the domain' },
            { id: 41, category: 'AD', name: 'Check Group Members', command: 'net group "GroupName" /domain', description: 'List members of a specific domain group' },
            { id: 42, category: 'AD', name: 'Find User SID', command: 'wmic useraccount where name="USERNAME" get sid', description: 'Get Security Identifier for a user' },
            { id: 43, category: 'AD', name: 'Add User to Domain Group', command: 'net group "GroupName" USERNAME /add /domain', description: 'Add user to a domain group' },
            { id: 44, category: 'AD', name: 'Remove User from Domain Group', command: 'net group "GroupName" USERNAME /delete /domain', description: 'Remove user from a domain group' },
            { id: 45, category: 'AD', name: 'Check Password Expiry', command: 'net user USERNAME /domain | findstr "password"', description: 'Check password expiration details' },
            { id: 46, category: 'AD', name: 'List Logon Hours', command: 'net user USERNAME /domain | findstr "Logon hours"', description: 'Display user logon time restrictions' },

            // Disk/Storage
            { id: 13, category: 'Disk', name: 'Check Disk Space', command: 'wmic logicaldisk get name,size,freespace', description: 'Display disk space for all drives' },
            { id: 14, category: 'Disk', name: 'Disk Usage by Folder', command: 'dir /s | findstr "File(s)"', description: 'Calculate folder size recursively' },
            { id: 15, category: 'Disk', name: 'Check Disk Health', command: 'wmic logicaldisk get name, status', description: 'Check logical disk status' },
            { id: 16, category: 'Disk', name: 'List Partitions', command: 'diskpart', description: 'Launch diskpart utility (interactive)' },
            { id: 17, category: 'Disk', name: 'Format Drive', command: 'format X: /FS:NTFS /Q', description: 'Quick format drive X: to NTFS' },
            { id: 18, category: 'Disk', name: 'Check File System', command: 'chkdsk C: /F /R', description: 'Schedule disk check for next boot' },
            { id: 47, category: 'Disk', name: 'List All Drives', command: 'wmic logicaldisk get name', description: 'Display all logical drives on system' },
            { id: 48, category: 'Disk', name: 'Get Folder Size', command: 'dir C:\Folder /s /b | find /c ":\"', description: 'Calculate total size of a folder' },
            { id: 49, category: 'Disk', name: 'Check Volume Label', command: 'vol C:', description: 'Display drive letter and volume label' },
            { id: 50, category: 'Disk', name: 'Repair File System Errors', command: 'sfc /scannow', description: 'Scan and repair system file corruption' },
            { id: 51, category: 'Disk', name: 'Check SMART Status', command: 'wmic logicaldisk get name,freespace,size', description: 'Monitor drive space and health' },
            { id: 52, category: 'Disk', name: 'Mount Virtual Disk', command: 'diskpart', description: 'Use diskpart to mount VHD files' },
            { id: 53, category: 'Disk', name: 'List File Permissions', command: 'icacls C:\Path', description: 'Display NTFS file permissions' },

            // User Management
            { id: 19, category: 'User', name: 'Create Local User', command: 'net user USERNAME password /add', description: 'Create local user account' },
            { id: 20, category: 'User', name: 'Delete Local User', command: 'net user USERNAME /delete', description: 'Remove local user account' },
            { id: 21, category: 'User', name: 'List Local Users', command: 'net user', description: 'Display all local user accounts' },
            { id: 22, category: 'User', name: 'Add to Local Group', command: 'net localgroup Administrators USERNAME /add', description: 'Add user to administrators group' },
            { id: 23, category: 'User', name: 'Disable User Account', command: 'net user USERNAME /active:no', description: 'Disable local user account' },
            { id: 24, category: 'User', name: 'Change User Password', command: 'net user USERNAME newpassword', description: 'Change local user password' },
            { id: 54, category: 'User', name: 'List Local Groups', command: 'net localgroup', description: 'Display all local groups on computer' },
            { id: 55, category: 'User', name: 'View Group Members', command: 'net localgroup Administrators', description: 'Show members of a local group' },
            { id: 56, category: 'User', name: 'Remove from Local Group', command: 'net localgroup Administrators USERNAME /delete', description: 'Remove user from local group' },
            { id: 57, category: 'User', name: 'Enable User Account', command: 'net user USERNAME /active:yes', description: 'Enable previously disabled user' },
            { id: 58, category: 'User', name: 'Set Password Never Expires', command: 'net user USERNAME /expires:never', description: 'Remove password expiration requirement' },
            { id: 59, category: 'User', name: 'List User Properties', command: 'net user USERNAME', description: 'Display detailed user account information' },
            { id: 60, category: 'User', name: 'Force User Logoff', command: 'logoff /server:SERVERNAME /v', description: 'Disconnect user session remotely' },

            // System
            { id: 25, category: 'System', name: 'System Info', command: 'systeminfo', description: 'Display detailed system information' },
            { id: 26, category: 'System', name: 'List Running Processes', command: 'tasklist', description: 'Show all running processes' },
            { id: 27, category: 'System', name: 'Kill Process by PID', command: 'taskkill /PID 1234 /F', description: 'Force terminate process (replace 1234 with PID)' },
            { id: 28, category: 'System', name: 'Check Event Logs', command: 'wevtutil qe System /c:10', description: 'Query last 10 system events' },
            { id: 29, category: 'System', name: 'Clear Event Logs', command: 'wevtutil cl System', description: 'Clear system event log' },
            { id: 30, category: 'System', name: 'Restart Computer', command: 'shutdown /r /t 30 /c "Reason"', description: 'Schedule restart in 30 seconds' },
            { id: 61, category: 'System', name: 'Shutdown Computer', command: 'shutdown /s /t 60 /c "Maintenance"', description: 'Schedule shutdown in 60 seconds' },
            { id: 62, category: 'System', name: 'Abort Shutdown', command: 'shutdown /a', description: 'Cancel scheduled shutdown or restart' },
            { id: 63, category: 'System', name: 'Get System Uptime', command: 'wmic os get lastbootuptime', description: 'Display when system was last booted' },
            { id: 64, category: 'System', name: 'List Services', command: 'net start', description: 'Show all running services' },
            { id: 65, category: 'System', name: 'Start Service', command: 'net start "Service Name"', description: 'Start a Windows service' },
            { id: 66, category: 'System', name: 'Stop Service', command: 'net stop "Service Name"', description: 'Stop a Windows service' },
            { id: 67, category: 'System', name: 'Check Service Status', command: 'sc query "Service Name"', description: 'Query the status of a specific service' },
            { id: 68, category: 'System', name: 'List Installed Software', command: 'wmic product list', description: 'Display all installed applications' },
            { id: 69, category: 'System', name: 'View Installed Updates', command: 'wmic qfe list', description: 'List all Windows updates/hotfixes' },
            { id: 70, category: 'System', name: 'Get CPU Info', command: 'wmic cpu list', description: 'Display processor information' },
            { id: 71, category: 'System', name: 'Get RAM Info', command: 'wmic MemPhysical list', description: 'Display physical memory capacity' },
            { id: 72, category: 'System', name: 'Check Windows Version', command: 'wmic os get version,buildnumber', description: 'Display Windows version and build' },
            { id: 73, category: 'System', name: 'List Environment Variables', command: 'set', description: 'Display all environment variables' },
            { id: 74, category: 'System', name: 'Schedule Task', command: 'schtasks /create /tn "Task Name" /tr "command" /sc daily', description: 'Create a scheduled task' },
            { id: 75, category: 'System', name: 'List Scheduled Tasks', command: 'schtasks /query /fo list', description: 'Show all scheduled tasks' },
            { id: 76, category: 'System', name: 'Delete Scheduled Task', command: 'schtasks /delete /tn "Task Name" /f', description: 'Remove a scheduled task' },
            { id: 77, category: 'System', name: 'Lock Screen', command: 'rundll32.exe user32.dll,LockWorkStation', description: 'Lock the computer immediately' },
        ];

        let customCommands = JSON.parse(localStorage.getItem('customCommands') || '[]');
        let selectedCategory = 'All';

        const searchInput = document.getElementById('searchInput');
        const filterButtons = document.getElementById('filterButtons');
        const commandsGrid = document.getElementById('commandsGrid');
        const commandCount = document.getElementById('commandCount');
        const addCommandBtn = document.getElementById('addCommandBtn');
        const customForm = document.getElementById('customForm');
        const customName = document.getElementById('customName');
        const customCommand = document.getElementById('customCommand');
        const customCategory = document.getElementById('customCategory');
        const saveCustomBtn = document.getElementById('saveCustomBtn');
        const cancelCustomBtn = document.getElementById('cancelCustomBtn');

        function init() {
            renderFilterButtons();
            renderCommands();
            searchInput.addEventListener('input', renderCommands);
            addCommandBtn.addEventListener('click', () => customForm.classList.add('open'));
            cancelCustomBtn.addEventListener('click', () => customForm.classList.remove('open'));
            saveCustomBtn.addEventListener('click', addCustomCommand);
        }

        function getAllCommands() {
            const customWithIds = customCommands.map((cmd, idx) => ({...cmd, id: 10000 + idx}));
            return [...defaultCommands, ...customWithIds];
        }

        function renderFilterButtons() {
            const categories = ['All', ...new Set(getAllCommands().map(cmd => cmd.category))];
            filterButtons.innerHTML = categories.map(cat => `
                <button class="filter-btn ${cat === 'All' ? 'active' : ''}" data-category="${cat}">${cat}</button>
            `).join('');

            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    selectedCategory = btn.dataset.category;
                    renderCommands();
                });
            });
        }

        function getFilteredCommands() {
            const searchTerm = searchInput.value.toLowerCase();
            const allCommands = getAllCommands();

            return allCommands.filter(cmd => {
                const matchesSearch = cmd.name.toLowerCase().includes(searchTerm) ||
                                    cmd.command.toLowerCase().includes(searchTerm) ||
                                    cmd.description.toLowerCase().includes(searchTerm);
                const matchesCategory = selectedCategory === 'All' || cmd.category === selectedCategory;
                return matchesSearch && matchesCategory;
            });
        }

        function renderCommands() {
            const filtered = getFilteredCommands();

            if (filtered.length === 0) {
                commandsGrid.innerHTML = '<div class="empty-state"><p>No commands found</p><p>Try adjusting your search or filter</p></div>';
            } else {
                commandsGrid.innerHTML = filtered.map(cmd => {
                    const isCustom = cmd.id >= 10000;
                    return `
                        <div class="command-card">
                            <div class="command-header">
                                <div class="command-info">
                                    <h3>${escapeHtml(cmd.name)}</h3>
                                    <p>${escapeHtml(cmd.description)}</p>
                                </div>
                                <span class="command-category">${cmd.category}</span>
                            </div>
                            <div class="command-code">
                                <code>${escapeHtml(cmd.command)}</code>
                                <button class="copy-btn" onclick="copyToClipboard('${cmd.command.replace(/'/g, "&apos;")}', this)" title="Copy to clipboard">📋</button>
                                ${isCustom ? `<button class="delete-btn" onclick="deleteCustom(${cmd.id - 10000})" title="Delete">🗑️</button>` : ''}
                            </div>
                        </div>
                    `;
                }).join('');
            }

            commandCount.textContent = `Showing ${filtered.length} command${filtered.length !== 1 ? 's' : ''}`;
        }

        function addCustomCommand() {
            if (customName.value.trim() && customCommand.value.trim()) {
                customCommands.push({
                    category: customCategory.value,
                    name: customName.value,
                    command: customCommand.value,
                    description: `Custom: ${customName.value}`
                });
                localStorage.setItem('customCommands', JSON.stringify(customCommands));

                customName.value = '';
                customCommand.value = '';
                customForm.classList.remove('open');

                renderFilterButtons();
                renderCommands();
            }
        }

        function deleteCustom(idx) {
            customCommands.splice(idx, 1);
            localStorage.setItem('customCommands', JSON.stringify(customCommands));
            renderFilterButtons();
            renderCommands();
        }

        function copyToClipboard(text, btn) {
            navigator.clipboard.writeText(text).then(() => {
                btn.textContent = '✓';
                btn.classList.add('copied');
                setTimeout(() => {
                    btn.textContent = '📋';
                    btn.classList.remove('copied');
                }, 2000);
            });
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        init();
    </script>
</body>
</html>
