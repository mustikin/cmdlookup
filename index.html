<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IT CMD Reference</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="container">

    <header>
      <h1>Quick Command Lookup</h1>
      <p>Quick Command Lookup</p>
    </header>

    <!-- Search Bar -->
    <div class="search-bar">
      <input
        type="text"
        id="searchInput"
        placeholder="Search commands... (e.g. ping, ip, user)"
        onkeyup="filterCommands()"
      />
    </div>

    <!-- Category Filter -->
    <div class="categories" id="categoryButtons">
      <button class="cat-btn active" onclick="filterByCategory('all', this)">All</button>
      <button class="cat-btn" onclick="filterByCategory('network', this)">🌐 Network</button>
      <button class="cat-btn" onclick="filterByCategory('user', this)">👤 User & AD</button>
      <button class="cat-btn" onclick="filterByCategory('disk', this)">💾 Disk</button>
      <button class="cat-btn" onclick="filterByCategory('system', this)">🖥️ System</button>
      <button class="cat-btn" onclick="filterByCategory('process', this)">⚙️ Process</button>
      <button class="cat-btn" onclick="filterByCategory('remote', this)">🔗 Remote</button>
    </div>

    <!-- Results Count -->
    <div class="results-count" id="resultsCount"></div>

    <!-- Command Cards -->
    <div class="command-grid" id="commandGrid"></div>

    <!-- No Results -->
    <div class="no-results" id="noResults" style="display:none;">
      😕 No commands found. Try a different search.
    </div>

  </div>

  <!-- Toast Notification -->
  <div class="toast" id="toast">📋 Copied to clipboard!</div>

  <script src="commands.js"></script>
  <script src="app.js"></script>
</body>
</html>
